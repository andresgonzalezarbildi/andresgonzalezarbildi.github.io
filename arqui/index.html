<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light">
<title>Arquitectura de Computadoras · Roadmap de examen</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app">
<aside class="sidebar" id="sidebar">
  <div class="brand"><small>Preparación de examen</small><strong>Arquitectura de Computadoras</strong></div>
  <nav class="nav" id="mainNav">
    <div class="nav-group-label">Plan personal</div>
    <button class="nav-item" data-section="inicio"><span class="nav-icon">⌂</span>Roadmap</button>
    <button class="nav-item" data-section="simulacro"><span class="nav-icon">◷</span>Simulacro y teoría rápida</button>
    <div class="nav-group-label">Temas</div>
    <button class="nav-item" data-section="temas"><span class="nav-icon">◇</span>Vista general</button>
    <details><summary>◈ Abrir tema</summary><div class="topic-list" id="sidebarTopics"></div></details>
    <div class="nav-group-label">Banco de examen</div>
    <button class="nav-item" data-section="banco"><span class="nav-icon">☷</span>Ejercicios y soluciones</button>
    <button class="nav-item" data-section="examenes"><span class="nav-icon">▦</span>Temas por examen</button>
    <div class="nav-group-label">Material</div>
    <button class="nav-item" data-section="fuentes"><span class="nav-icon">↗</span>Fuentes</button>
  </nav>
  <div class="sidebar-foot">
    <button class="side-action" id="exportProgress">Exportar progreso</button>
    <label class="side-action" style="text-align:center;cursor:pointer">Importar progreso<input id="importProgress" type="file" accept="application/json" hidden></label>
    <button class="side-action" id="resetProgress">Reiniciar progreso</button>
  </div>
</aside>
<div class="main">
  <div class="mobile-top"><strong>Arqui · Examen</strong><button id="menuToggle">Menú</button></div>
  <main class="content">
    <section class="section" id="sec-inicio"></section>
    <section class="section" id="sec-temas"></section>
    <section class="section" id="sec-habilidades"></section>
    <section class="section" id="sec-teoria"></section>
    <section class="section" id="sec-practica"></section>
    <section class="section" id="sec-talleres"></section>
    <section class="section" id="sec-banco"></section>
    <section class="section" id="sec-explorador"></section>
    <section class="section" id="sec-examenes"></section>
    <section class="section" id="sec-checklist"></section>
    <section class="section" id="sec-simulacro"></section>
    <section class="section" id="sec-estadisticas"></section>
    <section class="section" id="sec-fuentes"></section>
  </main>
</div>
</div>
<div class="toast" id="toast"></div>
<script src="app.js"></script>
</body></html>
