<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#080318">
  <meta
    name="description"
    content="Portal personal de aplicaciones, herramientas y material de estudio."
  >

  <title>Portal personal</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,430;9..144,560;9..144,680&family=IBM+Plex+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  >

  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="assets/css/style.css">
  <script src="assets/js/app.js" defer></script>
  <link rel="stylesheet" href="./styles.css">
  <link rel="icon" type="image/png" href="/images/favicon.png">
  <script defer src="./app.js"></script>
</head>

<body>
  <canvas id="fluidCanvas" aria-hidden="true"></canvas>
  <div class="atmosphere" aria-hidden="true"></div>

  <header class="topbar">
    <a class="brand" href="/" aria-label="Ir al inicio">
      <span class="brand__signal" aria-hidden="true"></span>
      <span>
        <strong>Portal personal</strong>
        <small id="totalApps">0 recursos</small>
      </span>
    </a>

    <label class="searchbar">
      <span aria-hidden="true">⌕</span>
      <input
        id="searchInput"
        type="search"
        placeholder="Buscar..."
        autocomplete="off"
      >
      <kbd>/</kbd>
    </label>
  </header>

  <main class="shell">
    <nav class="quick-nav" id="quickNav" aria-label="Navegación por grupos"></nav>

    <section class="results-bar">
      <p id="resultLabel">Mostrando todo</p>
      <button class="clear-search" id="clearSearch" type="button" hidden>
        Limpiar
      </button>
    </section>

    <section id="groupRoot" class="groups"></section>

    <section class="empty-state" id="emptyState" hidden>
      <strong>No encontré resultados.</strong>
      <p>Probá con otra palabra.</p>
    </section>

    <section class="personal-links" aria-labelledby="personalLinksTitle">
      <header class="personal-links__header">
        <span>Enlaces</span>
        <h2 id="personalLinksTitle">Dónde encontrarme</h2>
      </header>

      <div class="personal-links__stream" id="personalLinks"></div>
    </section>
  </main>

  <template id="groupTemplate">
    <section class="group">
      <header class="group__header">
        <span class="group__index"></span>

        <div>
          <p class="group__eyebrow"></p>
          <h2 class="group__title"></h2>
        </div>

        <p class="group__description"></p>
      </header>

      <div class="app-stream"></div>
    </section>
  </template>

  <template id="cardTemplate">
    <article class="portal-card">
      <span class="portal-card__flare" aria-hidden="true"></span>

      <div class="portal-card__side">
        <span class="portal-card__index"></span>
        <span class="portal-card__icon"></span>
      </div>

      <div class="portal-card__body">
        <div class="portal-card__tags"></div>
        <h3 class="portal-card__title"></h3>
        <p class="portal-card__description"></p>
      </div>

      <div class="portal-card__actions"></div>
    </article>
  </template>
</body>
</html>
